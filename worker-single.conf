# Solo un worker para distributions
[program:laravel-worker-distributions]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/comexcare2/artisan queue:work redis --queue=distributions,default --sleep=3 --tries=3 --timeout=300
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/laravel-worker-distributions.log
stopwaitsecs=3600