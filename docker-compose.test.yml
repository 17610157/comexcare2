version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: comexcare2-test-db
    environment:
      POSTGRES_DB: comexcare2-testing
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d comexcare2-testing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
    driver: local
